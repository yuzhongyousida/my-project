# 用户模块配置（端口8081，避免和商品模块冲突）
server:
  port: 8081
  servlet:
    context-path: /user-server

# 数据源配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/demo_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root  # 替换为你的MySQL用户名
    password: w123456789  # 替换为你的MySQL密码

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.demo.user.entity
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰